name: Tone
options:
  bundleIdPrefix: com.yutabee
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "4"
packages:
  ToneKit:
    path: .
targets:
  Tone:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    dependencies:
      - package: ToneKit
        product: ToneCore
      - package: ToneKit
        product: ToneAudio
      - package: ToneKit
        product: ToneUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yutabee.tone
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Tone uses the microphone to detect the pitch of your instrument. Audio is processed on-device and is never recorded or sent anywhere."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
      configs:
        # Debug / simulator / CI は署名不要(contributor が team 無しでもビルド可)。
        Debug:
          CODE_SIGNING_ALLOWED: "NO"
        # Release は手動署名で App Store 配信用に署名する。
        # 署名設定を「Tone ターゲット」に限定するのが要点:
        # xcargs でグローバル指定すると SPM 依存(Tonic / AudioKit)にも
        # PROVISIONING_PROFILE_SPECIFIER が波及し "does not support provisioning
        # profiles" で archive が失敗する。target-config スコープなら波及しない。
        # 事前に配布証明書 "Apple Distribution" と profile "Tone App Store" を
        # ローカルに install しておくこと(手順は docs/RELEASE.md)。
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Tone App Store"
