name: Tone
options:
  bundleIdPrefix: jp.syncbloom
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGNING_ALLOWED: "NO"
packages:
  ToneKit:
    path: .
targets:
  Tone:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    dependencies:
      - package: ToneKit
        product: ToneCore
      - package: ToneKit
        product: ToneAudio
      - package: ToneKit
        product: ToneUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: jp.syncbloom.tone
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Tone uses the microphone to detect the pitch of your instrument. Audio is processed on-device and is never recorded or sent anywhere."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
